        let remainingSongs = []
        let totalCorrectTime = 0
        let correctCount = 0
        let incorrectCount = 0

        let player
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                playerVars: {
                    playsinline: 1,
                },
                events: {
                    onReady: playerReady,
                }
            })
        }

        // const playerElement = document.getElementById('player')
        const remainingSongCount = document.getElementById('remaining-song-count')
        const songTitle = document.getElementById('song-title')
        const startButton = document.getElementById('start-button')
        const answerButton = document.getElementById('answer-button')
        const correctButton = document.getElementById('correct-button')
        const incorrectButton = document.getElementById('incorrect-button')
        const statusElement = document.getElementById('status')
        const timer = document.getElementById('timer')
        const correctCountElement = document.getElementById('correct-count')
        const incorrectCountElement = document.getElementById('incorrect-count')
        const averageTimeElement = document.getElementById('average-time')

        const playerReady = () => {
            startButton.addEventListener('click', (e) => {
                startButton.disabled = true
                startButton.style.display = 'none'
                answerButton.style.display = 'inline'
                change().then(() => {
                    startTimer()
                    answerButton.disabled = false
                })
            })
            answerButton.addEventListener('click', (e) => {
                // playerElement.style.display = 'block'
                document.getElementById('player').style.display = 'block'
                correctButton.style.display = 'inline'
                incorrectButton.style.display = 'inline'
                answerButton.disabled = true
                answerButton.style.display = 'none'
                songTitle.style.display = 'block'
                songTitle.innerText = player.getVideoData().title
                stopTimer()
            })
            correctButton.addEventListener('click', (e) => {
                // playerElement.style.display = 'none'
                document.getElementById('player').style.display = 'none'
                answerButton.style.display = 'inline'
                correctButton.style.display = 'none'
                incorrectButton.style.display = 'none'
                songTitle.style.display = 'none'
                correctCount++
                correctCountElement.innerText = correctCount
                totalCorrectTime += answerTime
                averageTimeElement.innerText = Math.round(totalCorrectTime / correctCount) / 10
                change().then(() => {
                    startTimer()
                    answerButton.disabled = false
                })
            })
            incorrectButton.addEventListener('click', (e) => {
                // playerElement.style.display = 'none'
                document.getElementById('player').style.display = 'none'
                answerButton.style.display = 'inline'
                correctButton.style.display = 'none'
                incorrectButton.style.display = 'none'
                songTitle.style.display = 'none'
                incorrectCount++
                incorrectCountElement.innerText = incorrectCount
                change().then(() => {
                    startTimer()
                    answerButton.disabled = false
                })
            })
            startButton.disabled = false
        }

        const change = async () => {
            if (!remainingSongs.length) {
                remainingSongs = songIds
            }
            const song = remainingSongs[Math.floor(Math.random() * remainingSongs.length)]
            remainingSongs = remainingSongs.filter(item => item !== song)
            remainingSongCount.innerText = remainingSongs.length + 1
            statusElement.innerText = '読み込み中'
            await loadSong(song)
            statusElement.innerText = '再生中'
        }

        function loadSong(songId) {
            return new Promise(resolve => {

                const handler = event => {
                    if (event.data === YT.PlayerState.PLAYING) {

                        player.removeEventListener(
                            'onStateChange',
                            handler
                        );

                        resolve();
                    }
                };

                player.addEventListener(
                    'onStateChange',
                    handler
                );

                player.loadVideoById(songId);
            });
        }

        let startTime
        let timeoutID
        let answerTime
        const displayTime = () => {
            const currentTime = new Date(Date.now() - startTime)
            answerTime = currentTime.getMinutes() * 600 + currentTime.getSeconds() * 10 + Math.floor(currentTime.getMilliseconds() / 100)
            timer.innerText = `${currentTime.getMinutes() * 60 + currentTime.getSeconds()}.${Math.floor(currentTime.getMilliseconds() / 100)}`
            timeoutID = setTimeout(displayTime, 100)
        }
        const startTimer = () => {
            startTime = Date.now()
            displayTime()
        }
        const stopTimer = () => {
            clearTimeout(timeoutID)
        }
    </script>
