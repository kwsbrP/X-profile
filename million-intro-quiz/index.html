<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>million-intro-quiz</title>
    <style>
        button {
            font-size: 2rem;
        }

        @media (max-width: 600px) {
            button {
                width: 45%;
                max-width: 400px;
                font-size: 1.5rem;
                margin: 0.25rem;
            }

            #player {
                max-height: 200px;
            }

            #player iframe {
                max-height: 200px;
            }
        }

        #player {
            max-width: 100%;
        }

        #player iframe {
            max-width: 100%;
        }

        .hidden {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
    </style>
</head>

<body>
    <h1>ミリオンライブ！イントロクイズ！</h1>
    <div id="setting">
        <label for="playing-song-count">遊ぶ曲数を入力 </label><input style="width: 8rem;" min="1" type="number"
            placeholder="遊ぶ曲数を入力" id="playing-song-count"><br>
        <button type="button" disabled id="start-button">スタート！</button>
        <button type="button" disabled id="start-all-button">全曲で遊ぶ</button>
    </div>
    <div id="result" style="display: none;">
        ランク:<span id="rank"></span><br>
        スコア:<span id="score"></span><br>
        平均正解時間:<span id="average-time-result"></span><br>
        正解率:<span id="accuracy"></span>(<span id="correct-count-result"></span>/<span id="question-count"></span>)<br>
        間違えた曲:
        <ul id="incorrect-songs"></ul>
    </div>
    <div id="controller" style="display: none;">
        <p>
            回答時間:<span id="timer">00.0</span><br>
            正解数:<span id="correct-count">0</span> 誤答数:<span id="incorrect-count">0</span> 平均正解時間:<span
                id="average-time">記録なし</span><br>
            残り曲数:<span id="remaining-song-count"></span><br>
            <span id="status"></span>
        </p>
        <button type="button" disabled id="answer-button" style="display: none;">回答する</button>
        <button type="button" id="show-answer-button" style="display: none">答えを見る</button>
        <button type="button" id="correct-button" style="display: none">正解</button>
        <button type="button" id="incorrect-button" style="display: none">不正解</button>
        <p id="song-title" style="display: none"></p>
        <div id="player" class="hidden"> </div>
        <script src="https://www.youtube.com/iframe_api"></script>
    </div>

        let remainingSongs = []

        let totalCorrectTime = 0
        let correctCount = 0

        let onSongStarted = null
        let onSongError = null

        let player
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                playerVars: {
                    playsinline: 1,
                },
                events: {
                    onReady: playerReady,
                    onStateChange(e) {
                        if (e.data === YT.PlayerState.PLAYING && onSongStarted) {
                            onSongStarted()
                            onSongStarted = null
                            onSongError = null
                        }
                    },
                    onError(e) {
                        if (onSongError) {
                            onSongError(e.data)
                            onSongStarted = null
                            onSongError = null
                        }
                    }
                }
            })
        }

        // const playerElement = document.getElementById('player')
        const remainingSongCount = document.getElementById('remaining-song-count')
        const songTitle = document.getElementById('song-title')
        const startButton = document.getElementById('start-button')
        const startAllButton = document.getElementById('start-all-button')
        const answerButton = document.getElementById('answer-button')
        const showAnswerButton = document.getElementById('show-answer-button')
        const correctButton = document.getElementById('correct-button')
        const incorrectButton = document.getElementById('incorrect-button')
        const statusElement = document.getElementById('status')
        const timer = document.getElementById('timer')
        const correctCountElement = document.getElementById('correct-count')
        const incorrectCountElement = document.getElementById('incorrect-count')
        const averageTimeElement = document.getElementById('average-time')

        document.getElementById('playing-song-count').max = songIds.length

        const playerReady = () => {
            startAllButton.addEventListener('click', async (e) => {
                remainingSongs = [...songIds]
                document.getElementById('setting').style.display = 'none'
                document.getElementById('result').style.display = 'none'
                document.getElementById('controller').style.display = 'block'
                answerButton.style.display = 'inline'
                const success = await change()
                if (success) {
                    startTimer()
                    answerButton.disabled = false
                } else {
                    showResult()
                }
            })
            startButton.addEventListener('click', async (e) => {
                const count = Number(document.getElementById('playing-song-count').value)
                if (!Number.isInteger(count) || count < 1 || count > songIds.length) {
                    alert('1~' + songIds.length + 'を入力してください。')
                    return
                }
                remainingSongs = [...songIds]
                for (let i = 0; i < songIds.length - count; i++) {
                    remainingSongs.splice(Math.floor(Math.random() * remainingSongs.length), 1)
                }
                document.getElementById('setting').style.display = 'none'
                document.getElementById('result').style.display = 'none'
                document.getElementById('controller').style.display = 'block'
                answerButton.style.display = 'inline'
                const success = await change()
                if (success) {
                    startTimer()
                    answerButton.disabled = false
                } else {
                    showResult()
                }
            })
            answerButton.addEventListener('click', (e) => {
                // playerElement.style.display = 'block'
                player.pauseVideo()
                statusElement.innerText = '停止中'
                answerButton.disabled = true
                answerButton.style.display = 'none'
                showAnswerButton.style.display = 'inline'
                stopTimer()
            })
            showAnswerButton.addEventListener('click', (e) => {
                player.playVideo()
                statusElement.innerText = '再生中'
                showAnswerButton.style.display = 'none'
                document.getElementById('player').classList.remove('hidden')
                correctButton.style.display = 'inline'
                correctButton.disabled = false
                incorrectButton.style.display = 'inline'
                incorrectButton.disabled = false
                songTitle.style.display = 'block'
                songTitle.innerText = player.getVideoData().title
            })
            correctButton.addEventListener('click', async (e) => {
                correctButton.disabled = true
                incorrectButton.disabled = true
                // playerElement.style.display = 'none'
                document.getElementById('player').classList.add('hidden')
                answerButton.style.display = 'inline'
                correctButton.style.display = 'none'
                incorrectButton.style.display = 'none'
                songTitle.style.display = 'none'
                correctCount++
                correctCountElement.innerText = correctCount
                totalCorrectTime += answerTime
                averageTimeElement.innerText = Math.round(totalCorrectTime / correctCount) / 10
                if (remainingSongs.length === 0) {
                    showResult()
                } else {
                    const success = await change()
                    if (success) {
                        startTimer()
                        answerButton.disabled = false
                    } else {
                        showResult()
                    }
                }
            })
            incorrectButton.addEventListener('click', async (e) => {
                correctButton.disabled = true
                incorrectButton.disabled = true
                // playerElement.style.display = 'none'
                document.getElementById('player').classList.add('hidden')
                answerButton.style.display = 'inline'
                correctButton.style.display = 'none'
                incorrectButton.style.display = 'none'
                songTitle.style.display = 'none'
                incorrectSongs.push([player.getVideoData().title, player.getVideoData().video_id])
                incorrectCount++
                incorrectCountElement.innerText = incorrectCount
                if (remainingSongs.length === 0) {
                    showResult()
                } else {
                    const success = await change()
                    if (success) {
                        startTimer()
                        answerButton.disabled = false
                    } else {
                        showResult()
                    }
                }
            })
            startButton.disabled = false
            startAllButton.disabled = false
        }

        const showResult = () => {
            player.pauseVideo()
            const incorrectSongsElement = document.getElementById('incorrect-songs')
            incorrectSongsElement.innerHTML = ''
            let rank = ''
            let averageTime = 0
            let score = 0

            let accuracy = correctCount / (correctCount + incorrectCount)

            if (!correctCount) {
                averageTime = '記録なし'
                score = 0
            } else {
                averageTime = Math.round(totalCorrectTime / correctCount) / 10
                score = Math.round(1000 * accuracy * (1 / (1 + averageTime / 5)))
                averageTime += '秒'
            }

            if (score >= 950) rank = 'SSS'
            else if (score >= 900) rank = 'SS'
            else if (score >= 850) rank = 'S'
            else if (score >= 750) rank = 'A'
            else if (score >= 600) rank = 'B'
            else if (score >= 450) rank = 'C'
            else if (score >= 300) rank = 'D'
            else if (score >= 200) rank = 'E'
            else rank = 'F'


            document.getElementById('rank').innerText = rank
            document.getElementById('score').innerText = score
            document.getElementById('average-time-result').innerText = averageTime
            document.getElementById('controller').style.display = 'none'
            document.getElementById('accuracy').innerText = (accuracy * 100).toFixed(1) + '%'
            document.getElementById('correct-count-result').innerText = correctCount
            document.getElementById('question-count').innerText = correctCount + incorrectCount
            document.getElementById('result').style.display = 'block'
            document.getElementById('setting').style.display = 'block'
            for (let song of incorrectSongs) {
                const a = document.createElement('a')
                a.href = `https://www.youtube.com/watch?v=${song[1]}`
                a.target = '_blank'
                a.rel = 'noopener noreferrer'
                a.textContent = song[0]
                const element = document.createElement('li')
                element.appendChild(a)
                incorrectSongsElement.appendChild(element)
            }

            totalCorrectTime = 0
            correctCount = 0
            incorrectCount = 0
            incorrectSongs = []
            correctCountElement.innerText = '0'
            incorrectCountElement.innerText = '0'
            averageTimeElement.innerText = '記録なし'
            timer.innerText = '00.0'
        }

        const change = async () => {
            while (remainingSongs.length) {
                const index = Math.floor(Math.random() * remainingSongs.length)
                const song = remainingSongs[index]
                statusElement.innerText = '読み込み中'
                try {
                    await loadSong(song)
                    remainingSongs.splice(index, 1)
                    remainingSongCount.innerText = remainingSongs.length + 1
                    statusElement.innerText = '再生中'
                    return true
                } catch (error) {
                    remainingSongs.splice(index, 1)
                    console.log(`動画エラー: ${song}`)
                }
            }
            return false
        }

        function loadSong(songId) {
            return new Promise((resolve, reject) => {
                const timeoutID = setTimeout(() => {
                    onSongStarted = null
                    onSongError = null
                    reject("timeout")
                }, 15000)
                onSongStarted = () => {
                    clearTimeout(timeoutID)
                    resolve()
                }
                onSongError = error => {
                    clearTimeout(timeoutID)
                    reject(error)
                }
                player.loadVideoById(songId)
            });
        }

        let startTime
        let timeoutID
        let answerTime
        const displayTime = () => {
            const currentTime = Date.now() - startTime
            answerTime = Math.floor(currentTime / 100)
            timer.innerText = (currentTime / 1000).toFixed(1)
            timeoutID = setTimeout(displayTime, 100)
        }
        const startTimer = () => {
            startTime = Date.now()
            displayTime()
        }
        const stopTimer = () => {
            clearTimeout(timeoutID)
        }
    </script>
</body>

</html>
